# SOPS encryption rules
#
# This file tells sops which keys can decrypt which secret files.
# The age key is derived from your SSH host key — no separate key management needed.
#
# Setup workflow:
#   1. Enable openssh and rebuild (generates /etc/ssh/ssh_host_ed25519_key)
#   2. Run: sops-age-pubkey
#          (prints your age public key — looks like: age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx)
#   3. Replace the placeholder below with your actual age public key
#   4. Encrypt your secrets: sops -e -i secrets/github.yaml
#
keys:
  - &host age1REPLACE_WITH_OUTPUT_OF_SOPS_AGE_PUBKEY

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *host
